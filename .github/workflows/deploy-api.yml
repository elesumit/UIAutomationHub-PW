name: Deploy API (Function App)

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

# Only one API deployment at a time
concurrency:
  group: deploy-api
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    # Skip on template repo — only run on site repos created from this template
    if: github.repository != 'techops/az-staticWeb-template'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install production dependencies
        working-directory: api
        run: npm ci --omit=dev || npm install --omit=dev

      # OIDC login using the per-site managed identity from terraform.tfvars.json.
      - name: Extract MI client ID
        id: config
        run: echo "MI_CLIENT_ID=$(python3 -c "import json; print(json.load(open('infra/terraform.tfvars.json'))['mi_client_id'])")" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: c990a453-711f-44d9-9285-8d4caa179d30
          subscription-id: c4b21de8-bb1c-4efb-b4ec-9431dc344558
          tenant-id: 21f2717a-4fc6-4665-b7ad-b490a46167e3

      - name: Deploy to Function App
        uses: Azure/functions-action@v1
        with:
          app-name: func-automationhub-prd
          package: api
          # FC1 Flex Consumption: remote build off; deps installed above.
          scm-do-build-during-deployment: false
          enable-oryx-build: false
